name: Build Multi-Platform Binary

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - .version
      - .github/workflows/build-multi-platform-binary.yml
      - .github/workflows/scripts/build-multi-platform-binary/*

jobs:
  load-env:
    uses: ./.github/workflows/load-env.yaml

  check-tag-and-release:
    needs:
      - load-env
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ needs.load-env.outputs.version }}
      should_proceed: ${{ steps.check.outputs.should_proceed }}
      tag_exists: ${{ steps.check.outputs.tag_exists }}
      release_exists: ${{ steps.check.outputs.release_exists }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Check if tag and release exist
      id: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ needs.load-env.outputs.version }}
      run: node ./.github/workflows/scripts/build-multi-platform-binary/check-tag-and-release.js

  build-binary:
    needs:
      - load-env
      - check-tag-and-release
    if: needs.check-tag-and-release.outputs.should_proceed == 'true'
    env:
      package_name: ${{ needs.load-env.outputs.package-name }}
    strategy:
      matrix:
        include:
          - os: ${{ needs.load-env.outputs.macOS-runner-os }}
            arch: universal
            xcode-version: ${{ needs.load-env.outputs.xcode-version }}
            swift-version: ${{ needs.load-env.outputs.swift-version }}
          - os: ${{ needs.load-env.outputs.macOS-runner-os }}
            arch: arm64
            xcode-version: ${{ needs.load-env.outputs.xcode-version }}
            swift-version: ${{ needs.load-env.outputs.swift-version }}
          - os: ${{ needs.load-env.outputs.macOS-runner-os }}
            arch: x86_64
            xcode-version: ${{ needs.load-env.outputs.xcode-version }}
            swift-version: ${{ needs.load-env.outputs.swift-version }}
          - os: ubuntu-latest
            arch: x86_64
            swift-version: ${{ needs.load-env.outputs.swift-version }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare Swift
        uses: ./.github/workflows/templates/prepare-swift/
        with:
          xcode-version: ${{ matrix.xcode-version }}
          swift-version: ${{ matrix.swift-version }}
          package-name: ${{ env.package_name }}
          build-system: swift
          configuration: release

      - name: Build binary
        id: build
        env:
          VERSION: ${{ needs.load-env.outputs.version }}
          ARCH: ${{ matrix.arch }}
          BINARY_NAME: ${{ needs.load-env.outputs.package-name }}
        run: ./.github/workflows/scripts/build-multi-platform-binary/build-binary.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.asset_name }}
          path: ${{ steps.build.outputs.asset_path }}
          retention-days: 1

  release:
    needs:
      - load-env
      - check-tag-and-release
      - build-binary
    if: needs.check-tag-and-release.outputs.should_proceed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create tag and release
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.load-env.outputs.version }}
          IS_PRERELEASE: ${{ needs.load-env.outputs.is_prerelease }}
        run: node ./.github/workflows/scripts/build-multi-platform-binary/create-release.js

      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.create-release.outputs.release_id }}
        run: |
          for artifact_dir in artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              for asset_file in "$artifact_dir"*.zip; do
                if [ -f "$asset_file" ]; then
                  asset_name=$(basename "$asset_file")
                  echo "Uploading $asset_name..."

                  # Get repository info
                  REPO_URL=$(git remote get-url origin)
                  REPO_PATH=$(echo "$REPO_URL" | sed -E 's|.*github\.com[:/]([^/]+/[^/.]+).*|\1|')

                  # Upload asset using GitHub API
                  curl -L \
                    -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $GITHUB_TOKEN" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    -H "Content-Type: application/zip" \
                    "https://uploads.github.com/repos/$REPO_PATH/releases/$RELEASE_ID/assets?name=$asset_name" \
                    --data-binary "@$asset_file"
                fi
              done
            fi
          done
